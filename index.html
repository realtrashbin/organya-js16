<html>

<head>
    <title>Organya16 Web Player</title>
    <link rel="icon" type="image/x-icon" href="https://realtrashbin.github.io/organya-js16/OrgUI/icon1.ico">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <style>
        body {
            background-color: #d4d0c8;
        }

        body,
        html {
            height: 100%;
            margin: 0;
            padding: 0
        }

        #toolbar {
            position: absolute;
            flex-wrap: nowrap;
            height: 40px;
            display: flex;
            top: 0;
            left: 0;
            right: 0;
        }

        #toolbar select {
            min-width: 0;
            max-width: 256px;
            flex: 0 1 auto;
        }

        #canvas-container {
            position: absolute;
            top: 40px;
            bottom: 0;
            left: 0;
            right: 0;
        }
    </style>
</head>

<body>
    <div id="toolbar">
        <select id="songs"></select>
        <button onclick="play()"><img src="OrgUI/buttons/Play.png"></img></button>
        <button onclick="stop()"><img src="OrgUI/buttons/Pause.png"></img></button>
    </div>
    <div id="canvas-container">
        <canvas id="org-canvas"></canvas>
    </div>

    <!-- increment before each deploy -->
    <script src="organya16.js?cache_bust=1"></script>
    <script src="organya-ui.js?cache_bust=1"></script>
    <script>
        (() => {
            const songs = `Bi_N/JavaScript.org16
Bi_N/Escaping The Prison 2.org16
Bi_N/Balrog's ThemeV2.org16`.split("\n").sort();

            const songListEl = document.getElementById("songs");
            for (let song of songs) {
                song = song.trim();
                const opt = document.createElement("option");
                opt.value = "songs/" + song;
                opt.textContent = song;

                songListEl.appendChild(opt);
            }

            const canvasContainer = document.getElementById("canvas-container");
            const orgCanvas = document.getElementById("org-canvas");
            orgCanvas.width = canvasContainer.clientWidth;
            orgCanvas.height = canvasContainer.clientHeight;
            const ui = new OrganyaUI(orgCanvas);

            window.addEventListener("resize", () => {
                orgCanvas.width = canvasContainer.clientWidth;
                orgCanvas.height = canvasContainer.clientHeight;
                ui.draw();
            })

            let currentOrg = null;
            window.stop = () => {
                if (currentOrg != null) {
                    currentOrg.stop();
                    currentOrg = null;
                }
            }

            window.play = async () => {
                stop();

                console.log("fetching song...");
                const res = await fetch(songListEl.options[songListEl.selectedIndex].value);
                const data = await res.arrayBuffer();
                await initOrganya();

                currentOrg = new Organya(data);
                ui.setOrganya(currentOrg);
                currentOrg.play();
            }
        })();
    </script>
</body>

</html>
